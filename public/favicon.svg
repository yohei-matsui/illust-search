<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景グラデーション（ピンク系） -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4c8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <!-- ハイライトグラデーション -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <!-- 影用フィルター -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#9d174d" flood-opacity="0.45"/>
    </filter>
    <!-- 奥行きレイヤー用フィルター -->
    <filter id="shadow2" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9d174d" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 奥行き感の背面レイヤー（少し暗い） -->
  <rect x="28" y="38" width="456" height="456" rx="100" ry="100" fill="#9d174d" opacity="0.5" filter="url(#shadow2)" />

  <!-- メイン背景 -->
  <rect x="20" y="20" width="456" height="456" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- ハイライト（光沢感） -->
  <rect x="20" y="20" width="456" height="230" rx="96" ry="96" fill="url(#highlightGrad)" />

  <!-- 筆アイコン（白） -->
  <!-- 筆の持ち手（斜め長方形） -->
  <g transform="translate(256,256) rotate(-40)" fill="white">
    <!-- 筆の軸 -->
    <rect x="-18" y="-155" width="36" height="180" rx="18" ry="18" fill="white" opacity="0.95"/>
    <!-- 金属バンド部分 -->
    <rect x="-20" y="18" width="40" height="22" rx="4" ry="4" fill="white" opacity="0.7"/>
    <!-- 筆先（三角形っぽく） -->
    <ellipse cx="0" cy="62" rx="20" ry="14" fill="white" opacity="0.95"/>
    <path d="M -20 58 Q 0 100 20 58 Z" fill="white" opacity="0.95"/>
    <!-- 筆先の先端 -->
    <path d="M -8 92 Q 0 130 8 92 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- キラキラ装飾（小さい星） -->
  <circle cx="370" cy="120" r="12" fill="white" opacity="0.6"/>
  <circle cx="395" cy="148" r="6" fill="white" opacity="0.4"/>
  <circle cx="148" cy="370" r="8" fill="white" opacity="0.35"/>
</svg>
